publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  firebase_core:
  firebase_ai: ^3.11.0

  http: ^1.2.0
  googleapis_auth: ^1.6.0

  google_fonts: ^6.3.3
  flutter_lucide: ^1.0.0
  flutter_markdown: ^0.7.7
  markdown: ^7.3.1

  file_picker: ^10.3.8
  shared_preferences: ^2.2.3
  path: ^1.9.0
  desktop_drop: ^0.6.0
  google_generative_ai: ^0.4.7
  url_launcher: ^6.3.0
  pasteboard: ^0.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true